<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fiona Marketing</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #1a1a1a; color: white; }
        header { display: flex; justify-content: space-between; padding: 20px; background: #000; border-bottom: 2px solid #ffcc00; }
        .hero { text-align: center; padding: 80px; background: #1a1a1a; }
        h1 { color: #ffcc00; font-size: 3em; margin: 0; }
        section { padding: 50px 20px; text-align: center; }
        .projects { display: flex; justify-content: center; gap: 20px; }
        .project-box { width: 250px; height: 150px; background: #ffcc00; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <strong>Fiona Marketing</strong>
        <nav>About | Projects | Contact</nav>
    </header>

    <div class="hero">
        <h1>Digital Marketing Agency in India</h1>
    </div>

    <section id="about">
        <h2>About Us</h2>
        <p>We are a creative agency dedicated to helping your business grow online.</p>
    </section>

    <section id="projects">
        <h2>Our Recent Projects</h2>
        <div class="projects">
            <div class="project-box">Project 1</div>
            <div class="project-box">Project 2</div>
        </div>
    </section>

    <section id="contact">
        <h2>Let's Talk</h2>
        <p>Contact us at: hello@fionamarketing.com</p>
    </section>

</body>
</html>
